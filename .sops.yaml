# Phase 11 — règle de chiffrement sops pour les secrets serveur (cf.
# docs/exploitation/29-rotation-secrets.md).
#
# Recipient = clé PUBLIQUE age du serveur de prod. La clé PRIVÉE correspondante vit
# UNIQUEMENT dans ~/.config/sops/age/keys.txt (serveur, mode 600) + une sauvegarde
# offline — JAMAIS dans le repo. Une clé publique n'est pas un secret : elle ne sert
# qu'à CHIFFRER ; seul le détenteur de la clé privée peut DÉCHIFFRER.
#
# Le format dotenv n'est pas auto-détecté depuis l'extension `.enc` → les scripts
# passent toujours `--input-type dotenv --output-type dotenv` (with-secrets.sh,
# sops-edit.sh). Cette règle fournit le recipient à `sops -e` (plus besoin de --age).
creation_rules:
  - path_regex: \.env\.server\.enc$
    age: age1kgl35m9smf22ajjryg0qvm06sr8gv798k79hugw7722u48mmz4as67naxa
