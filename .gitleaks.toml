# Configuration gitleaks — étend le jeu de règles par défaut.
# Le job CI `secret-scan` (gitleaks-action v3) charge automatiquement ce fichier
# à la racine du dépôt. Syntaxe `[allowlist]` singulière = compatible gitleaks 8.x
# (la forme `[[allowlists]]` n'est honorée que par les versions récentes ; la CI
# embarque 8.24.3).
[extend]
useDefault = true

# Faux positif documenté : la règle `generic-api-key` se déclenche sur le passage
# d'accessibilité FR « …modales accessibles, onglets/landmarks » de docs/06.
# Neutralisé par un motif précis (pas une exclusion de fichier entière).
#
# `.env.server.enc` (Phase 11) : artefact sops+age dont les VALEURS sont chiffrées
# (ENC[AES256_GCM,data:…]). Les blobs base64 déclenchent generic-api-key/high-entropy
# alors qu'ils ne révèlent AUCUN secret (déchiffrables seulement avec la clé age, hors
# repo). On allowliste donc ce SEUL chemin. Les critères d'un même bloc [allowlist]
# sont combinés en OU (défaut gitleaks 8.x) : une trouvaille est ignorée si elle
# correspond au motif d'accessibilité OU au chemin du fichier chiffré.
#
# Lot L4 — specs Pact désabonnement : le consumer signe des jetons HMAC de TEST avec le
# secret `pact-desabo-secret` (verify déterministe, AUCUNE valeur de prod). Ces jetons
# signés atterrissent dans la fixture générée `pacts/api-gateway-svc-foyer.json` (champs
# "token" = blobs base64) où la règle generic-api-key les flague. `--redact` masque la
# valeur → on ne peut pas allowlister par motif ; on allowliste donc ce SEUL fichier de
# contrat (fixture de test générée, pas un secret réel).
[allowlist]
description = "Accessibilite FR + sops .env.server.enc + jetons de test pact (desabo)"
regexTarget = "match"
regexes = ['''onglets/landmarks''', '''pact-desabo-secret''']
paths = ['''\.env\.server\.enc$''', '''pacts/api-gateway-svc-foyer\.json$''']
