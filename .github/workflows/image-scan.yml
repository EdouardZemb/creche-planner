# Phase 12 (roadmap CI/CD) — VEILLE CVE DES IMAGES DÉJÀ DÉPLOYÉES.
#
# Le « CVE-drift » : Trivy ne scanne qu'au BUILD (porte bloquante de `build-images`
# dans ci.yml et de release.yml). Une CVE HIGH/CRITICAL divulguée APRÈS la
# publication d'une image en prod passe inaperçue — l'artefact est immuable
# (Phase 2, `IMAGE_TAG=0.1.0`), n'est plus rebuild, donc plus jamais re-scané. Ce
# workflow re-scanne en CONTINU (cron quotidien) les images RÉELLEMENT en ligne et
# NOTIFIE par e-mail (réutilise la conf SMTP de la Phase 4) sur tout finding —
# SANS RIEN bloquer (veille, pas une porte de déploiement).
#
# NON-BLOCAGE — un finding CVE ne fait JAMAIS échouer le run (vert + e-mail).
# Seul un échec OPÉRATIONNEL de la veille (version introuvable, Trivy en erreur,
# e-mail non délivré alors qu'il y a des findings) passe le run ROUGE : visible,
# et sans impact sur aucun build (rien ne dépend de ce workflow). Cf. le script
# `.github/workflows/scripts/image-rescan.mjs` (logique pure Node, testable en
# `SCAN_DRY_RUN=1`).
#
# SECRET — la notification réutilise le mot de passe d'application Gmail de la
# Phase 4, fourni ici comme SECRET Actions `ALERTMANAGER_SMTP_PASSWORD` (même
# valeur que `.env.server`). Sans ce secret, un run avec findings échoue
# bruyamment (veille muette interdite). Détails : docs/exploitation/observabilite.md.
#
# Actions épinglées par SHA (AUD-02), Node figé via .nvmrc (AUD-10), timeout borné
# (AUD-03), concurrence (AUD-14), permissions au plus juste.
name: Image CVE rescan (veille)

on:
  schedule:
    - cron: '17 5 * * *' # chaque jour 05:17 UTC
  workflow_dispatch:
    inputs:
      version:
        description: "Tag d'image à scanner (vide ⇒ version prod déduite de l'API Deployments)"
        required: false
        default: ''

permissions:
  contents: read # checkout (.trivyignore + script)
  deployments: read # déduire la version prod en ligne
  packages: read # pull des images GHCR à scanner

concurrency:
  group: image-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rescan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      # Installe le binaire Trivy (version épinglée). La base de vulnérabilités est,
      # elle, rafraîchie à chaque run par Trivy (c'est tout l'intérêt de la veille :
      # capter les CVE divulguées depuis le dernier build).
      - name: Installer Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.71.2

      - name: Re-scan CVE + notification (non bloquant)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          # Vide en cron (⇒ version prod déduite de l'API) ; renseigné en dispatch.
          SCAN_VERSION: ${{ github.event.inputs.version }}
          # Secret de la Phase 4 (mot de passe d'application Gmail). Absent ⇒ run
          # rouge SEULEMENT s'il y a des findings (veille muette interdite).
          SMTP_PASSWORD: ${{ secrets.ALERTMANAGER_SMTP_PASSWORD }}
        run: node .github/workflows/scripts/image-rescan.mjs
