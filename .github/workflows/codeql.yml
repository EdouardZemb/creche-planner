# CodeQL — analyse statique de sécurité (SAST) du code TS/JS (doc 18 §8, action P1-6).
# Volet « SAST » de la chaîne sécurité, en complément du SCA (`pnpm audit` dans ci.yml)
# et de Dependabot.
#
# ✅ RÉ-ACTIVÉ (2026-06-18, PUB-D doc 29 §4). Le dépôt est désormais PUBLIC : GitHub
# Advanced Security (code scanning) est gratuit, donc l'UPLOAD des résultats SARIF
# fonctionne. On restaure les déclencheurs automatiques (push:main + pull_request +
# schedule hebdo). Historique : le job avait été mis EN PAUSE le 2026-06-10 (doc 25)
# car l'upload échouait sur dépôt PRIVÉ en plan gratuit (« Code scanning is not
# enabled »), ce qui rougissait `main` sans valeur ; seul `workflow_dispatch` restait.
name: CodeQL

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * 1' # lundi 03:00 UTC

# Annule les runs obsolètes sur une même PR (pushes rapprochés). Le `group` inclut
# `event_name` pour que les runs `pull_request`, `push` et le passage hebdomadaire
# `schedule` ne s'annulent JAMAIS entre eux ; on ne pré-annule que sur PR.
concurrency:
  group: codeql-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyse CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialiser CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript
          # `security-and-quality` ajoute des requêtes de qualité aux requêtes de sécurité.
          queries: security-and-quality

      - name: Analyse
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: '/language:javascript-typescript'
