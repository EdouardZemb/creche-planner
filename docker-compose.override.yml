# Override de DÉVELOPPEMENT — publication des ports sur l'hôte.
#
# Chargé AUTOMATIQUEMENT par `docker compose` quand aucun `-f` n'est passé
# (dev local, e2e/smoke en CI). Il N'EST PAS chargé en production, qui invoque
# explicitement `-f docker-compose.yml -f docker-compose.server.yml` : la prod
# ne publie donc QUE les ports de Caddy (override serveur), tout le reste
# (Postgres, NATS, observabilité, services, web) reste interne au réseau Docker.
#
# => But sécurité : ne plus exposer les bases/observabilité au LAN en prod,
#    tout en gardant les ports accessibles en local (localhost) pour le debug
#    et les tests E2E/smoke qui tapent sur les ports hôte.
name: creche-planner

services:
  postgres-referentiel:
    ports:
      - '5433:5432'

  postgres-foyer:
    ports:
      - '5434:5432'

  postgres-planification:
    ports:
      - '5435:5432'

  postgres-tarification:
    ports:
      - '5436:5432'

  nats:
    ports:
      - '4222:4222'
      - '8222:8222'

  otel-collector:
    ports:
      - '4317:4317'
      - '4318:4318'
      - '8888:8888'
      - '8889:8889'

  tempo:
    ports:
      - '3200:3200'

  prometheus:
    ports:
      - '9090:9090'

  alertmanager:
    ports:
      - '9093:9093'

  nats-exporter:
    ports:
      - '7777:7777'

  blackbox-exporter:
    ports:
      - '9115:9115'

  postgres-exporter-referentiel:
    ports:
      - '9187:9187'

  postgres-exporter-foyer:
