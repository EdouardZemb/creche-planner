      - '9188:9187'

  postgres-exporter-planification:
    ports:
      - '9189:9187'

  postgres-exporter-tarification:
    ports:
      - '9190:9187'

  grafana:
    ports:
      - '3003:3000'

  loki:
    ports:
      - '3100:3100'

  promtail:
    ports:
      - '9080:9080'

  svc-referentiel:
    ports:
      - '3001:3001'

  svc-foyer:
