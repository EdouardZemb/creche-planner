server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

# Metrics generator (Phase 13a) — dérive les métriques RED (Rate/Errors/Duration)
# par service À PARTIR des traces existantes, SANS instrumenter le code applicatif.
# Le processeur `span-metrics` émet `traces_spanmetrics_calls_total` (compteur, par
# service/span/kind/status_code) et `traces_spanmetrics_latency` (histogramme de
# durée en secondes) ; `local-blocks` stocke les traces récentes pour les requêtes
# TraceQL metrics. Ces séries sont POUSSÉES vers Prometheus en `remote_write`
# (Prometheus DOIT accepter l'écriture distante : flag
# `--web.enable-remote-write-receiver`, cf. docker-compose.yml).
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

# Tempo est mono-tenant ici : on active le metrics generator pour le tenant par
# défaut via les overrides globaux (sans quoi les processeurs ci-dessus restent
# inertes même configurés).
overrides:
  defaults:
    metrics_generator:
      processors:
        - span-metrics
        - local-blocks

usage_report:
  reporting_enabled: false
