groups:
  # ---------------------------------------------------------------------------
  # Groupe 1 : Disponibilité des cibles Prometheus
  # Sources : métriques up{} natives Prometheus (tous jobs scrappés)
  # ---------------------------------------------------------------------------
  - name: disponibilite
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Cible Prometheus hors ligne : {{ $labels.job }} / {{ $labels.instance }}'
          description: >
            La cible {{ $labels.instance }} (job {{ $labels.job }}) est inaccessible
            depuis plus d'1 minute (up = 0). Vérifiez que le service est démarré et
            que le port est accessible depuis le réseau Docker.

  # ---------------------------------------------------------------------------
  # Groupe 1bis : Disponibilité des SERVICES APPLICATIFS (Phase 6)
  # Source : probe_success du blackbox-exporter (job `blackbox`, prometheus.yml),
  #          qui sonde /api/health/live des 5 services (api-gateway + svc-*).
  # Comble l'angle mort de ServiceDown (qui ne couvre que les cibles d'infra :
  # otel-collector, otel-metrics, prometheus, nats-exporter). Sans cette règle,
  # la chute de l'api-gateway ou d'un svc-* ne déclenchait AUCUNE alerte.
  # Routée vers le receiver e-mail `email-ops` via le label severity=critical
  # (Alertmanager : route accélérée des alertes critiques).
  # ---------------------------------------------------------------------------
  - name: services-applicatifs
    interval: 30s
    rules:
      - alert: AppServiceDown
        expr: probe_success == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Service applicatif injoignable : {{ $labels.service }}'
          description: >
            La sonde de liveness ({{ $labels.instance }}) du service
            {{ $labels.service }} échoue depuis plus d'1 minute (probe_success = 0).
            Le service ne répond plus en HTTP 2xx : conteneur arrêté, crash au
            démarrage, ou port inaccessible sur le réseau Docker. Vérifiez
            `docker compose ps` et les logs du conteneur, puis relancez-le.

  # ---------------------------------------------------------------------------
  # Groupe 2 : Collecteur OpenTelemetry
  # Sources : métriques otelcol_* exposées sur otel-collector:8888
  # ---------------------------------------------------------------------------
  - name: otel-collector
    interval: 30s
    rules:
      - alert: OtelCollectorSpansDrops
        expr: >
          rate(otelcol_exporter_enqueue_failed_spans[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: 'OTel Collector — spans perdus (queue saturée)'
          description: >
            Le collecteur OTel perd des spans (file d'attente de l'exporter pleine).
            Exporter : {{ $labels.exporter }}. Taux actuel : {{ $value | humanize }}/s.
            Causes possibles : Tempo indisponible, débit trop élevé, mémoire insuffisante.

      - alert: OtelCollectorReceiverRefusedSpans
        expr: >
          rate(otelcol_receiver_refused_spans[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: 'OTel Collector — spans refusés par le receiver'
          description: >
            Le receiver {{ $labels.receiver }} du collecteur OTel refuse des spans.
            Taux actuel : {{ $value | humanize }}/s. Vérifiez la configuration du receiver
            et la charge réseau.

  # ---------------------------------------------------------------------------
  # Groupe 3 : JetStream NATS — Consumer lag
  # Sources : métriques gnatsd_* exposées via prometheus-nats-exporter (job nats-exporter)
  # PRÉREQUIS : nats-exporter doit être actif dans docker-compose.yml
  # ---------------------------------------------------------------------------
  - name: jetstream-lag
    interval: 30s
    rules:
      - alert: JetStreamLagCroissant
        expr: >
          increase(gnatsd_consumer_num_pending{consumer_name=~"tarification-.*"}[5m]) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'JetStream — lag croissant sur {{ $labels.consumer_name }}'
          description: >
            Le consumer durable {{ $labels.consumer_name }} (stream {{ $labels.stream_name }})
            accumule des messages non traités : {{ $value }} messages supplémentaires en 5 min.
            Lag actuel : {{ $value }}. Vérifiez que svc-tarification est opérationnel et
            que la projection ne boucle pas en NAK.

      - alert: JetStreamLagCritique
        expr: >
          gnatsd_consumer_num_pending{consumer_name=~"tarification-.*"} > 5000
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'JetStream — lag critique sur {{ $labels.consumer_name }}'
          description: >
            Le consumer durable {{ $labels.consumer_name }} dépasse 5000 messages en attente.
            Cela indique un arrêt prolongé de svc-tarification ou une boucle de re-livraison
            non résolue. Lag actuel : {{ $value }}.

      - alert: JetStreamRedeliveriesElevees
        expr: >
          rate(gnatsd_consumer_num_redelivered{consumer_name=~"tarification-.*"}[5m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'JetStream — re-livraisons élevées sur {{ $labels.consumer_name }}'
          description: >
            Le consumer {{ $labels.consumer_name }} enregistre un taux de re-livraisons
            élevé ({{ $value | humanize }}/s). Cela suggère des erreurs répétées de projection
            (ex. contrainte DB, service référentiel manquant). Vérifiez les logs de svc-tarification.

      - alert: NatsExporterDown
        expr: up{job="nats-exporter"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: 'nats-exporter hors ligne — métriques JetStream indisponibles'
          description: >
            Le prometheus-nats-exporter est inaccessible depuis 2 minutes.
            Les métriques JetStream (consumer lag, messages) ne sont plus disponibles.
            Vérifiez le service nats-exporter dans docker-compose.yml.

  # ---------------------------------------------------------------------------
  # Groupe 4 : Repli synchrone tarif→planif (DEC-05, couplage runtime résiduel)
  # Source : compteur applicatif tarification_repli_planification_total exporté
  #          par svc-tarification via OTel Metrics → OTel Collector → Prometheus.
  # PRÉREQUIS : pipeline métriques OTel câblé (MeterProvider + exporter OTLP côté
  #             service, pipeline metrics + exporter prometheus côté collecteur,
  #             et scrape de cet exporter). Voir observabilite.md (besoins d'intégration).
  # Le repli est un couplage ASSUMÉ (ADR-0004) : il doit rester EXCEPTIONNEL.
  # ---------------------------------------------------------------------------
  - name: repli-synchrone
    interval: 30s
    rules:
      - alert: RepliPlanificationFrequent
        expr: >
          sum(rate(tarification_repli_planification_total[5m])) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Repli synchrone tarif→planif trop fréquent (read model froid)'
          description: >
            svc-tarification interroge svc-planification en HTTP synchrone
            (repli sur read model froid) à un rythme soutenu :
            {{ $value | humanize }} repli/s sur 5 min (seuil 0,2/s pendant 10 min).
            Ce couplage runtime doit rester exceptionnel (ADR-0004 / DEC-05).
            Causes probables : consumer de projection en retard/bloqué (voir lag JetStream),
            réindexation incomplète, ou pic de simulations sur des contrats non projetés.

      - alert: RepliPlanificationCritique
        expr: >
          sum(rate(tarification_repli_planification_total[5m])) > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'Repli synchrone tarif→planif massif — read model probablement HS'
          description: >
            Le taux de replis synchrones tarif→planif dépasse 1/s sur 5 min
            ({{ $value | humanize }} repli/s). Le read model de tarification est
            vraisemblablement froid à grande échelle (consumer arrêté, base purgée).
            Le couplage runtime résiduel devient un chemin nominal : investiguer en
            priorité (lag JetStream, santé de svc-tarification, projection.service).

  # ---------------------------------------------------------------------------
  # Groupe 5 : Bases Postgres (Phase 13c)
  # Source : postgres-exporter (job `postgres`, label `base`). `pg_up` reflète la
  # joignabilité de la DB depuis l'exporter (l'injoignabilité de l'EXPORTER lui-même
  # est déjà couverte par ServiceDown / up==0). Routé vers email-ops via severity.
  # ---------------------------------------------------------------------------
  - name: postgres
    interval: 30s
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Base Postgres injoignable : {{ $labels.base }}'
          description: >
            L'exporter du job postgres (base {{ $labels.base }}) ne parvient plus à
            interroger sa base depuis plus d'1 minute (pg_up = 0). La base est arrêtée,
            sature ses connexions, ou refuse l'authentification. Vérifiez le conteneur
            postgres-{{ $labels.base }} (`docker compose ps`, logs).

      - alert: PostgresTooManyConnections
        expr: >
          sum by (base) (pg_stat_database_numbackends)
          / max by (base) (pg_settings_max_connections) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Postgres {{ $labels.base }} — connexions proches de la limite'
          description: >
            La base {{ $labels.base }} utilise plus de 80 % de ses connexions autorisées
            ({{ $value | humanizePercentage }}) depuis 5 min. Risque de refus de connexion
            (« too many clients »). Vérifiez les connexions oisives (pool applicatif) et
            `max_connections`.

      - alert: PostgresLongRunningTransaction
        expr: max by (base) (pg_stat_activity_max_tx_duration) > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Postgres {{ $labels.base }} — transaction longue (> 5 min)'
          description: >
            Une transaction tourne depuis plus de 5 minutes sur la base {{ $labels.base }}
            (max {{ $value | humanizeDuration }}). Une transaction « idle in transaction »
            ou une requête bloquée retient des verrous et empêche le VACUUM. Identifiez-la
            via pg_stat_activity.

      - alert: PostgresDeadlocks
        expr: sum by (base) (increase(pg_stat_database_deadlocks[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Postgres {{ $labels.base }} — deadlocks détectés'
          description: >
            La base {{ $labels.base }} a enregistré {{ $value | humanize }} deadlock(s) sur
            les 5 dernières minutes. Deux transactions se sont mutuellement bloquées : Postgres
            en a annulé une. Vérifiez l'ordre d'acquisition des verrous côté applicatif.

  # ---------------------------------------------------------------------------
  # Groupe 6 : Fondations backend (chantier n°10, lot 2)
  # Sources : compteurs/jauges applicatifs émis via OTel Metrics → OTel Collector
  #           (exporter prometheus :8889) → Prometheus (job otel-metrics).
  #   • consumer_rejets_total{stream,raison}  — libs/nest-commons (dead-letter, lot 1)
  #   • outbox_backlog / outbox_publications_echecs_total — libs/nest-commons/outbox
  #   • notifications_envoi_echecs_total — libs/nest-commons/mailer (svc-notifications)
  #   • gateway_authz_refus_total{decision,motif} — api-gateway (appartenance.guard)
  #   • svc_scope_refus_total{decision} — libs/nest-commons (scope-foyer.guard, lot 4)
  # Toutes routées e-mail via le label `severity` (receiver email-ops par défaut).
  # ---------------------------------------------------------------------------
  - name: fondations
    interval: 30s
    rules:
      # Un message JetStream a été mis en dead-letter pour une VRAIE perte : illisible
      # (PARSE_KO), enveloppe sans `type` (ENVELOPPE_INVALIDE) ou livraisons épuisées
      # (MAX_LIVRAISONS). On EXCLUT délibérément `raison="TYPE_INCONNU"` : un type connu
      # de l'écosystème mais non projeté par ce service (ex. un abonné au stream FOYER
      # complet reçoit des types qu'il n'utilise pas) part aussi en dead-letter (critère
      # d'acceptation du lot 1), mais c'est un IGNORE DE ROUTINE, pas une perte parent —
      # l'inclure ferait sonner l'alerte en permanence. La trace reste en base
      # (`dead_letter`, raison=TYPE_INCONNU) pour audit. Voir runbook.
      - alert: ConsumerRejetsDetectes
        expr: >
          increase(consumer_rejets_total{raison!="TYPE_INCONNU"}[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Rejet consumer JetStream ({{ $labels.raison }}) sur le stream {{ $labels.stream }}'
          description: >
            Un consommateur a mis un message du stream {{ $labels.stream }} en dead-letter
            (raison {{ $labels.raison }}) : {{ $value | humanize }} sur 15 min. C'est une
            perte potentielle (message illisible, enveloppe invalide, ou livraisons épuisées),
            pas un ignore de routine. Inspecter la table `dead_letter` du service concerné :
            `SELECT raison, sujet, erreur, livraisons, created_at FROM dead_letter
            WHERE raison <> 'TYPE_INCONNU' ORDER BY created_at DESC LIMIT 20;` puis corréler
            aux logs (Loki : `{service=~"svc-.*"} |= "Dead-letter"`).

      - alert: OutboxBacklogPersistant
        expr: outbox_backlog > 25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Backlog outbox persistant ({{ $value }}) — publication en retard'
          description: >
            La jauge `outbox_backlog` dépasse 25 événements non publiés depuis 10 min
            ({{ $value }} en attente). Le relais outbox ne draine plus assez vite : NATS
            injoignable, boucle d'erreur de publication, ou pic d'écritures. Vérifier la
            connexion NATS du service, les logs `OutboxRelay` (Loki : `|= "Relais outbox"`)
            et corréler avec `OutboxPublicationsEchecs` / le lag JetStream (dashboard 3).

      - alert: OutboxPublicationsEchecs
        expr: >
          increase(outbox_publications_echecs_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Échecs de publication outbox (relais bloqué)'
          description: >
            Le relais outbox a échoué {{ $value | humanize }} cycle(s) de drain sur 15 min
            (publication NATS ou écriture KO). Les événements restent `published_at IS NULL`
            et seront republiés — pas de perte, mais un blocage durable retarde la propagation
            (récap parent, read models). Logs : `{service=~"svc-.*"} |= "Relais outbox interrompu"`.

      - alert: EnvoiEmailEchecs
        expr: >
          increase(notifications_envoi_echecs_total[30m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Échec(s) d'envoi e-mail (transport SMTP)"
          description: >
            Le transport SMTP a rejeté {{ $value | humanize }} envoi(s) sur 30 min : un récap
            parent ou un mail au service de garde n'est pas parti. Vérifier les identifiants /
            la joignabilité du smarthost et les logs `MailerService` du conteneur
            svc-notifications (Loki : `{service="svc-notifications"} |= "sendMail"`). Un slot
            en `ECHEC` est retenté au tick suivant ; un échec persistant finit en
            `recap_hebdo_abandonne_total` (rappel perdu).

      - alert: AuthzGatewayRefus
        expr: >
          increase(gateway_authz_refus_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Refus d'autorisation gateway ({{ $labels.decision }} / {{ $labels.motif }})"
          description: >
            La gateway a compté {{ $value | humanize }} refus d'appartenance foyer sur 1 h
            (decision={{ $labels.decision }}, motif={{ $labels.motif }}). `refuse` = 403 réel
            (tentative d'accès à un foyer non autorisé, ou résolution fail-closed) ; `aurait_refuse`
            = observe-only (à surveiller AVANT toute bascule enforce : un flux non nul signale
            des faux positifs, ex. un point d'appel oublié). Corréler aux logs
            (Loki : `{service="api-gateway"} |= "appartenance"`).

      # Défense en profondeur (lot 4) : un service a détecté une requête ciblant un foyer
      # NON couvert par l'assertion (gateway contournée/boguée, ou point d'appel oublié).
      # `decision="refuse"` = 403 réel (enforce) ; `aurait_refuse` = observe-only. Le suivi
      # de `aurait_refuse` pendant la période observe conditionne la bascule enforce (~1
      # semaine à zéro « SCOPE AURAIT REFUSÉ » légitime, cf. docs/exploitation/authz-inter-services.md).
      - alert: ScopeInterServicesRefus
        expr: >
          increase(svc_scope_refus_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: 'Refus de scoping inter-services ({{ $labels.decision }})'
          description: >
            Un service a compté {{ $value | humanize }} refus de scoping par ressource sur 1 h
            (decision={{ $labels.decision }}). `refuse` = 403 réel (un foyer a tenté de lire/écrire
            les données d'un autre, gateway contournée) ; `aurait_refuse` = observe-only (mesure ce
            que l'enforce refuserait — AVANT bascule, un flux non nul signale un faux positif, ex.
            un client interne sans assertion machine ou une règle de scoping trop stricte). Corréler
            aux logs (Loki : `{service=~"svc-.*"} |= "SCOPE AURAIT REFUSÉ"` ou `|= "SCOPE REFUSÉ"`).
