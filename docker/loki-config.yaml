# Loki — agrégation des logs (Phase 13b). Déploiement « single binary » (tous les
# composants dans un process), stockage FILESYSTEM (volume loki-data) : suffisant pour
# la volumétrie d'un mono-serveur. Grafana l'interroge comme datasource `loki` ; la
# corrélation Tempo→Loki se fait via le champ `trace_id` des logs pino (line filter).
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  # Loki est BAVARD en info → on garde l'essentiel (les push Promtail restent visibles
  # en cas d'erreur). Évite de noyer `docker logs loki`.
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Rétention 7 jours (appliquée par le compactor ci-dessous) — logs = données chaudes
  # de diagnostic, pas d'archivage long terme.
  retention_period: 168h
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  # Métadonnées structurées (Loki 3.x) — permet d'attacher trace_id sans en faire un label.
  allow_structured_metadata: true
  # Tolère un léger décalage d'horloge entre Promtail et Loki.
  reject_old_samples: true
  reject_old_samples_max_age: 168h

compactor:
  working_directory: /loki/compactor
  # Applique réellement `retention_period` (sinon les chunks ne sont jamais supprimés).
  retention_enabled: true
  delete_request_store: filesystem

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# Pas de télémétrie « phone-home » (cohérent avec usage_report: false de Tempo).
analytics:
  reporting_enabled: false
