global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Règles d'alerte Prometheus (ServiceDown, JetStream lag, OTel drops, repli synchrone).
rule_files:
  - /etc/prometheus/alerts/alerts.yml

# Routage des alertes vers Alertmanager (P2-3, doc 18). Les règles qui passent en
# « firing » sont poussées à Alertmanager (groupage/inhibition/notification).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # Métriques internes du collecteur OTel (spans reçus/exportés, queue, CPU/mémoire).
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # Métriques APPLICATIVES réexposées par le collecteur (pipeline metrics → exporter
  # prometheus sur :8889). Source de tarification_repli_planification_total (P2-3).
  - job_name: 'otel-metrics'
    static_configs:
      - targets: ['otel-collector:8889']

  # Métriques Prometheus lui-même (up, scrape duration, etc.).
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Métriques JetStream NATS via prometheus-nats-exporter.
  # Le service nats-exporter scrape l'API monitoring NATS (:8222) et expose
  # les métriques au format Prometheus sur :7777.
  # Métriques clés : gnatsd_consumer_num_pending (consumer lag),
  # gnatsd_stream_msgs, gnatsd_varz_connections, gnatsd_consumer_num_redelivered.
  - job_name: 'nats-exporter'
    static_configs:
      - targets: ['nats-exporter:7777']

  # Métriques Postgres (Phase 13c) via postgres-exporter — une cible par base. Le
  # label `base` (referentiel/foyer/planification/tarification/notifications) identifie
  # l'instance ; les métriques portent aussi `datname` (base interrogée) et `server`
  # (hôte:port). `pg_up == 0` = exporter joignable mais DB injoignable → PostgresDown.
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter-referentiel:9187']
        labels: { base: referentiel }
      - targets: ['postgres-exporter-foyer:9187']
        labels: { base: foyer }
      - targets: ['postgres-exporter-planification:9187']
        labels: { base: planification }
      - targets: ['postgres-exporter-tarification:9187']
        labels: { base: tarification }
      - targets: ['postgres-exporter-notifications:9187']
        labels: { base: notifications }

  # Sondes « boîte noire » des 6 services APPLICATIFS (Phase 6). Jusqu'ici aucun
  # svc-* ni l'api-gateway n'était scrapé : si la gateway tombait, AUCUNE alerte
  # ne partait. On sonde l'endpoint de LIVENESS (/api/health/live, sans dépendance
  # externe) via le blackbox-exporter. Le résultat est exposé en `probe_success`
  # (1 = 2xx atteint, 0 = injoignable/non-2xx) → arme l'alerte AppServiceDown.
  #
  # Mécanique du relabeling : la cible RÉELLE du scrape est le blackbox-exporter
  # (:9115) ; l'URL à sonder transite par le paramètre `target`. On préserve l'URL
  # sondée dans le label `instance`, et on dérive un label `service` lisible.
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: ['http_2xx']
    static_configs:
      - targets:
          - http://api-gateway:3000/api/health/live
          - http://svc-referentiel:3001/api/health/live
          - http://svc-foyer:3002/api/health/live
          - http://svc-planification:3004/api/health/live
          - http://svc-tarification:3005/api/health/live
          - http://svc-notifications:3006/api/health/live
    relabel_configs:
      # 1) L'adresse de la cible devient le paramètre ?target= passé au prober.
      - source_labels: [__address__]
        target_label: __param_target
      # 2) On conserve l'URL sondée comme `instance` (lisible dans les alertes).
      - source_labels: [__param_target]
        target_label: instance
      # 3) `service` = nom d'hôte extrait de l'URL (api-gateway, svc-foyer, …).
      - source_labels: [__param_target]
        regex: 'https?://([^:/]+).*'
        replacement: '${1}'
        target_label: service
      # 4) Le scrape réel vise le blackbox-exporter, pas le service directement.
      - target_label: __address__
        replacement: blackbox-exporter:9115
