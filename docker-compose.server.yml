# Override de PRODUCTION (serveur Linux dédié, réseau local).
#
# S'applique PAR-DESSUS docker-compose.yml (qui reste le profil dev/CI, inchangé) :
#   docker compose --env-file .env.server \
#     -f docker-compose.yml -f docker-compose.server.yml pull
#   docker compose --env-file .env.server \
#     -f docker-compose.yml -f docker-compose.server.yml up -d --wait
#
# CD réel (AUD-05, doc 25) — la prod CONSOMME les images publiées sur GHCR par la
# CI (`ghcr.io/<owner>/creche-planner/<svc>:${IMAGE_TAG}`), elle ne les RECONSTRUIT
# plus (`--build` supprimé → parité d'artefact : ce qui tourne = ce que la CI a
# testé/scanné/signé). `image:` ci-dessous PRIME sur le `build:` du fichier de base
# au merge Compose. Prérequis serveur : `docker login ghcr.io` (images privées) et
# `IMAGE_TAG` dans .env.server (cf. .env.server.example). Vérif. signature cosign :
# voir docs/exploitation/24-plan-deploiement-serveur-ct-qdo.md §5 (porte 1bis).
#
# Ce que cet override apporte (cf. docs/exploitation/24-plan-deploiement-serveur-ct-qdo.md) :
#   - restart: unless-stopped sur TOUS les services (survie au reboot serveur) ;
#   - secrets réels injectés depuis .env.server (mots de passe BDD, Grafana) ;
#   - api-gateway durci : CORS restreint à l'origine du serveur, rate-limit prod (120/min) ;
#   - Grafana : accès anonyme désactivé, mot de passe admin réel ;
#   - reverse-proxy TLS (Caddy) : SEUL point d'entrée publié vers le LAN (80→443).
#
# IMPORTANT — exposition réseau : Compose CONCATÈNE les listes `ports` lors du merge ;
# on ne peut donc PAS « retirer » ici les ports publiés par le fichier de base.
# La fermeture de Postgres/NATS/observabilité au LAN est assurée par le PARE-FEU
# (règles DOCKER-USER via ufw-docker) — voir la doc 24, étape pare-feu.
# Seuls les ports du conteneur `caddy` (80/443) sont autorisés depuis le LAN.

services:
  # --- Infrastructure : secrets + redémarrage automatique --------------------
  postgres-referentiel:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${PG_REFERENTIEL_PWD:?defini .env.server}

  postgres-foyer:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${PG_FOYER_PWD:?defini .env.server}

  postgres-planification:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${PG_PLANIFICATION_PWD:?defini .env.server}

  postgres-tarification:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${PG_TARIFICATION_PWD:?defini .env.server}

  postgres-notifications:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${PG_NOTIFICATIONS_PWD:?defini .env.server}

  nats:
    restart: unless-stopped

  # Exporters Postgres (Phase 13c) — surcharge du mot de passe par le secret PG_*_PWD
  # (le base/dev utilise le défaut). Même schéma que DATABASE_URL des services.
  postgres-exporter-referentiel:
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://referentiel:${PG_REFERENTIEL_PWD:?defini .env.server}@postgres-referentiel:5432/referentiel?sslmode=disable

  postgres-exporter-foyer:
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://foyer:${PG_FOYER_PWD:?defini .env.server}@postgres-foyer:5432/foyer?sslmode=disable

  postgres-exporter-planification:
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://planification:${PG_PLANIFICATION_PWD:?defini .env.server}@postgres-planification:5432/planification?sslmode=disable

  postgres-exporter-tarification:
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://tarification:${PG_TARIFICATION_PWD:?defini .env.server}@postgres-tarification:5432/tarification?sslmode=disable

  postgres-exporter-notifications:
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://notifications:${PG_NOTIFICATIONS_PWD:?defini .env.server}@postgres-notifications:5432/notifications?sslmode=disable

  # --- Observabilité ---------------------------------------------------------
  otel-collector:
    restart: unless-stopped

  tempo:
    restart: unless-stopped

  prometheus:
    restart: unless-stopped

  alertmanager:
    restart: unless-stopped
    # Receiver e-mail (Phase 4, doc 24 §8) : le mot de passe d'application Gmail est
    # injecté en fichier-secret Docker, lu par docker/alertmanager.yml via
    # smtp_auth_password_file. Source = ALERTMANAGER_SMTP_PASSWORD (.env.server).
    secrets:
      - alertmanager_smtp_password

  nats-exporter:
    restart: unless-stopped

  blackbox-exporter:
    restart: unless-stopped

  grafana:
    restart: unless-stopped
    environment:
      # Durcissement : plus d'accès anonyme admin (profil dev), login requis.
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_AUTH_DISABLE_LOGIN_FORM: 'false'
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PWD:?defini .env.server}
      # Phase 4 — annotations de déploiement (DORA) : plugin Infinity + token de
      # lecture consommé par le datasource « GitHub Deployments » (provisionné dans
      # docker/grafana/provisioning/datasources/datasources.yaml).
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
      GH_DEPLOYMENTS_TOKEN: ${GH_DEPLOYMENTS_TOKEN:-}

  # --- Services métier : secrets BDD + redémarrage ---------------------------
  svc-referentiel:
    image: ghcr.io/edouardzemb/creche-planner/svc-referentiel:${IMAGE_TAG:-main}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://referentiel:${PG_REFERENTIEL_PWD:?defini .env.server}@postgres-referentiel:5432/referentiel

  svc-foyer:
    image: ghcr.io/edouardzemb/creche-planner/svc-foyer:${IMAGE_TAG:-main}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://foyer:${PG_FOYER_PWD:?defini .env.server}@postgres-foyer:5432/foyer
      # Désabonnement one-click (RFC 8058, PR5) : svc-foyer signe les jetons
      # `desabonnement_token` (HMAC). REQUIS en prod (`:?`) — un secret vide/faible
      # rendrait les jetons forgeables. À définir dans .env.server PUIS .env.server.enc
      # (sops, cf. doc 29) AVANT le prochain déploiement, comme PG_NOTIFICATIONS_PWD :
      # sans lui, `docker compose config` échoue et le déploiement est refusé. Le défaut
      # de dev de config.ts n'est JAMAIS un secret de prod. Cf. .env.server.example.
      DESABONNEMENT_TOKEN_SECRET: ${DESABONNEMENT_TOKEN_SECRET:?defini .env.server}
      # Durée de validité d'un lien de désabonnement (jours) — défaut sain 30.
      DESABONNEMENT_TOKEN_TTL_JOURS: ${DESABONNEMENT_TOKEN_TTL_JOURS:-30}

  svc-planification:
    image: ghcr.io/edouardzemb/creche-planner/svc-planification:${IMAGE_TAG:-main}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://planification:${PG_PLANIFICATION_PWD:?defini .env.server}@postgres-planification:5432/planification

  svc-tarification:
    image: ghcr.io/edouardzemb/creche-planner/svc-tarification:${IMAGE_TAG:-main}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://tarification:${PG_TARIFICATION_PWD:?defini .env.server}@postgres-tarification:5432/tarification

  # Lot 7 — svc-notifications : image GHCR + secret BDD + e-mails récap (Lots 5 & 6).
  # ENVOI RÉEL = effet de bord vers un tiers → GARDE-FOU EN PROFONDEUR :
  #   - NOTIF_EMAIL_DRY_RUN défaut `true` ici → AUCUN SMTP réel tant qu'on ne pose pas
  #     EXPLICITEMENT `false` dans .env.server (config.ts ne sort du bac à sable que
  #     sur un `false` littéral) ;
  #   - NOTIF_EMAIL_ALLOWLIST (CSV) neutralise tout destinataire hors liste (rodage) ;
  #   - le transport réutilise le MÊME mot de passe d'application Gmail qu'Alertmanager
  #     (ALERTMANAGER_SMTP_PASSWORD) — mappé sur SMTP_PASSWORD, jamais dupliqué en clair.
  # Le lien « valider » des mails pointe vers l'origine publique (SERVER_ORIGIN).
  # Cf. .env.server.example (§ svc-notifications) et apps/svc-notifications/src/config.ts.
  svc-notifications:
    image: ghcr.io/edouardzemb/creche-planner/svc-notifications:${IMAGE_TAG:-main}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://notifications:${PG_NOTIFICATIONS_PWD:?defini .env.server}@postgres-notifications:5432/notifications
      # URL publique = base du lien « valider la semaine » inséré dans les mails.
      NOTIF_APP_URL: ${SERVER_ORIGIN:?defini .env.server}
      # Désabonnement one-click (RFC 8058, PR5) : base publique de l'API gateway,
      # cible de l'en-tête `List-Unsubscribe` (POST direct du client de messagerie sur
      # ${SERVER_ORIGIN}/api/v1/desabonnement?token=…). Même origine publique que le front.
      NOTIF_PUBLIC_API_URL: ${SERVER_ORIGIN:?defini .env.server}
      # Adresse `mailto:` optionnelle ajoutée à l'en-tête List-Unsubscribe (repli non
      # one-click, RFC 2369). Vide → seule l'URL HTTPS one-click est publiée.
      NOTIF_UNSUBSCRIBE_MAILTO: ${NOTIF_UNSUBSCRIBE_MAILTO:-}
      # Transport SMTP (Gmail) — voir config.ts (clés SMTP_USER/SMTP_PASSWORD). Le mot
      # de passe est celui d'Alertmanager (app password Gmail), non redupliqué.
      SMTP_USER: ${NOTIF_SMTP_USER:-}
      SMTP_PASSWORD: ${ALERTMANAGER_SMTP_PASSWORD:-}
      NOTIF_EMAIL_FROM: ${NOTIF_EMAIL_FROM:-Crèche Planner <edouard.zemb@gmail.com>}
      NOTIF_EMAIL_PARENT: ${NOTIF_EMAIL_PARENT:-edouard.zemb@gmail.com}
      # GARDE-FOU : dry-run par défaut. Passer NOTIF_EMAIL_DRY_RUN=false dans .env.server
      # SEULEMENT quand l'envoi réel au service est validé bout-en-bout.
      NOTIF_EMAIL_DRY_RUN: ${NOTIF_EMAIL_DRY_RUN:-true}
      NOTIF_EMAIL_ALLOWLIST: ${NOTIF_EMAIL_ALLOWLIST:-}

  # --- Gateway (BFF) : durcissement applicatif -------------------------------
  api-gateway:
    image: ghcr.io/edouardzemb/creche-planner/api-gateway:${IMAGE_TAG:-main}
    restart: unless-stopped
    environment:
      # Liste blanche CORS = l'origine publique du serveur (vs '*' en dev).
      CORS_ORIGINS: ${SERVER_ORIGIN:?defini .env.server}
      # Retour à la valeur de prod (le 100000 du base est un réglage E2E).
      RATE_LIMIT_MAX: '120'
      # Auth par jeton : VOLONTAIREMENT non défini. La gateway n'est pas joignable
      # depuis le LAN (reverse-proxy + pare-feu) ; un token côté SPA fuiterait dans
      # le bundle JS sans gain réseau. Décommenter SEULEMENT si la gateway devait
      # un jour être exposée directement (et alors injecter le header côté nginx).
      # GATEWAY_TOKEN: ${GATEWAY_TOKEN}
      #
      # Échappatoire EXPLICITE du garde-fou de démarrage (AQ-01, doc 27) : les
      # images tournent avec NODE_ENV=production, et sans cette ligne la gateway
      # REFUSE de démarrer quand GATEWAY_TOKEN est absent. La poser ici (fichier
      # versionné) transforme le défaut implicite en décision tracée. La RETIRER
      # le jour où GATEWAY_TOKEN est activé ci-dessus.
      GATEWAY_AUTH_DISABLED: '1'
      #
      # --- Feature « parents du foyer » : identité / autorisation (PR5-7) ------
      # Tout est OPT-IN : ces variables PASSENT depuis .env.server(.enc) si elles y
      # sont définies, sinon elles arrivent VIDES → comportement actuel inchangé,
      # ZÉRO 403 introduit. Activation = poser les valeurs dans .env.server.enc
      # (sops, cf. doc 29) puis recréer ce conteneur — AUCUNE ré-édition de ce
      # fichier. Détail + runbook de mise en service : docs/06 §24 (PR8).
      #
      # PR5 — identité B1 (Cloudflare Access). Team domain (issuer + base JWKS) et
      # tag `aud` de l'application CF. Vides → validation JWT inactive (le guard
      # d'identité ne pose aucune identité ; comportement legacy). Non secrets au
      # sens strict, mais PII-adjacents → versionnés chiffrés dans .env.server.enc.
      # NB : le garde-fou de boot `verifierConfigProduction` qui les EXIGE en prod
      # est court-circuité par GATEWAY_AUTH_DISABLED=1 ci-dessus ; le guard, lui,
      # les consomme dès qu'elles sont posées (indépendant de cette échappatoire).
      CF_ACCESS_TEAM_DOMAIN: ${CF_ACCESS_TEAM_DOMAIN:-}
      CF_ACCESS_AUD: ${CF_ACCESS_AUD:-}
      # PR6 — provisioning admin. CSV d'e-mails admin (PII → .env.server.enc). Vide
      # ⇒ gating admin DÉSACTIVÉ (idiome repo, cf. GATEWAY_TOKEN). Posé ⇒ 403 sur
      # création de foyer + écritures parents pour tout e-mail vérifié hors liste.
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      # PR7 — enforcement de l'autorisation par foyer. `=1` ⇒ refus réel 403 sur
      # les routes scopées foyer ; vide/absent ⇒ observe-only (journalise « AURAIT
      # REFUSÉ », laisse passer). N'ACTIVER (`=1`) qu'APRÈS back-fill des parents
      # vérifié (sinon des foyers seraient verrouillés) — DÉCISION HUMAINE, doc 24.
      FOYER_AUTHZ_ENFORCE: ${FOYER_AUTHZ_ENFORCE:-}

  # --- Front : plus de port LAN direct (servi via Caddy) ---------------------
  web:
    image: ghcr.io/edouardzemb/creche-planner/web:${IMAGE_TAG:-main}
    restart: unless-stopped
    # NB : le mapping 4200 du base subsiste (merge Compose) mais est BLOQUÉ au LAN
    # par le pare-feu. Caddy joint `web` par le réseau Docker interne (web:80).

  # --- Reverse-proxy TLS : SEUL point d'entrée du LAN ------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      # Domaine/host servi (ex. creche.lan ou l'IP du serveur). Voir .env.server.
      SERVER_DOMAIN: ${SERVER_DOMAIN:?defini .env.server}
      # Port HTTPS public (pour que la redirection 80->HTTPS vise le bon port même
      # quand on publie sur un port non standard, ex. 8443).
      CADDY_PUBLIC_HTTPS_PORT: ${CADDY_HTTPS_PORT:-443}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      # Ports publiés configurables (défaut 80/443). Sur un serveur où 443 est déjà
      # occupé par un autre reverse-proxy, surcharger dans .env.server :
      #   CADDY_HTTP_PORT=8080  /  CADDY_HTTPS_PORT=8443
      - '${CADDY_HTTP_PORT:-80}:80'
      - '${CADDY_HTTPS_PORT:-443}:443'
    depends_on:
      api-gateway:
        condition: service_started

  # --- Tunnel Cloudflare : exposition PUBLIQUE sans port ouvert --------------
  # Connexion SORTANTE vers le réseau Cloudflare : aucun port entrant à ouvrir,
  # IP publique masquée. Le mapping « hostname public -> http://web:80 » ET la
  # politique d'authentification (Cloudflare Access) se configurent dans le
  # tableau de bord Zero Trust ; ce conteneur n'a besoin que du jeton du tunnel.
  # Il atteint le front par le réseau Docker interne (service `web`, port 80).
  # NB : à épingler par digest pour une pile reproductible (cf. images observa.).
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?defini .env.server}
    depends_on:
      web:
        condition: service_started

volumes:
  caddy-data:
  caddy-config:

secrets:
  # Mot de passe d'application Gmail pour les e-mails d'alerte Alertmanager (Phase 4).
  # JAMAIS dans le repo : valeur lue depuis ALERTMANAGER_SMTP_PASSWORD de .env.server
  # (Compose passe --env-file .env.server). Compose la matérialise dans le conteneur
  # alertmanager à /run/secrets/alertmanager_smtp_password (cf. docker/alertmanager.yml,
  # smtp_auth_password_file). Source `environment` volontairement absente du compose de
  # base (docker-compose.yml) : en dev/CI la variable n'existe pas et un secret de source
  # `environment` non défini fait échouer Compose — le secret n'est donc déclaré qu'ici.
  alertmanager_smtp_password:
    environment: ALERTMANAGER_SMTP_PASSWORD
