server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Le front appelle /api/v1/... (chemin relatif) ; nginx relaie vers la gateway
  # sur le réseau interne docker. Pas de CORS (même origine).
  location /api/ {
    proxy_pass http://api-gateway:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Fallback SPA : toute autre route sert index.html (routeur côté client).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
